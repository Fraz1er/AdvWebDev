name: react-resources-page

services:
  react-app:
    build: .
    container_name: react-resources-app
    ports:
      - "5173:5173"
    volumes:
      # Mount current directory for live reload
      - .:/app
      # Keep node_modules separate
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true