<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking System - Reservations</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-50">
  <!-- Navigation -->
  <nav class="bg-white border-b border-black/10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex">
          <div class="flex-shrink-0 flex items-center">
            <h1 class="text-xl font-bold text-brand-primary">Booking System</h1>
          </div>
          <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
            <a href="/resources" class="border-transparent text-gray-500 hover:text-gray-700 inline-flex items-center px-1 pt-1 text-sm font-medium">Resources</a>
            <a href="/reservations" class="border-brand-primary text-gray-900 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">Reservations</a>
          </div>
        </div>
        <div class="flex items-center">
          <button id="logoutBtn" class="text-sm text-gray-500 hover:text-gray-700">Logout</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Header -->
    <div class="mb-8">
      <h2 class="text-2xl font-bold text-gray-900">Manage Reservations</h2>
      <p class="text-sm text-gray-500 mt-1">Create, view, update and delete reservations</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Left Column: Reservation Form -->
      <div>
        <div class="bg-white rounded-2xl border border-black/10 p-6">
          <h3 class="text-lg font-semibold mb-4" id="formTitle">Create New Reservation</h3>
          
          <!-- Form Message -->
          <div id="formMessage" class="mb-6 rounded-2xl border px-4 py-3 text-sm hidden"></div>

 <!-- Reservation Form -->
<form id="reservationForm" class="space-y-4">
  <input type="hidden" id="reservationId" name="reservationId">
  <input type="hidden" id="userId" name="userId" value="1">
  
  <!-- Resource ID -->
  <div>
    <label for="resourceId" class="block text-sm font-medium text-gray-700">Resource ID *</label>
    <select id="resourceId" name="resourceId" required class="mt-1 block w-full rounded-2xl border border-black/10 bg-white px-4 py-3 text-sm focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/30">
      <option value="">Select a resource</option>
    </select>
  </div>

  <!-- User info (read-only display) -->
  <div class="bg-blue-50 border border-blue-200 rounded-2xl p-3 text-sm text-blue-800">
    Creating reservations as <strong>User ID: 1</strong>
  </div>

  <!-- Start Time -->
  <div>
    <label for="startTime" class="block text-sm font-medium text-gray-700">Start Time *</label>
    <input type="datetime-local" id="startTime" name="startTime" required class="mt-1 block w-full rounded-2xl border border-black/10 bg-white px-4 py-3 text-sm focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/30">
  </div>


            <!-- End Time -->
            <div>
              <label for="endTime" class="block text-sm font-medium text-gray-700">End Time *</label>
              <input type="datetime-local" id="endTime" name="endTime" required class="mt-1 block w-full rounded-2xl border border-black/10 bg-white px-4 py-3 text-sm focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/30">
            </div>

            <!-- Note -->
            <div>
              <label for="note" class="block text-sm font-medium text-gray-700">Note</label>
              <textarea id="note" name="note" rows="3" class="mt-1 block w-full rounded-2xl border border-black/10 bg-white px-4 py-3 text-sm focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/30" placeholder="Add any notes about this reservation"></textarea>
            </div>

            <!-- Status -->
            <div>
              <label for="status" class="block text-sm font-medium text-gray-700">Status *</label>
              <select id="status" name="status" required class="mt-1 block w-full rounded-2xl border border-black/10 bg-white px-4 py-3 text-sm focus:border-brand-blue focus:ring-2 focus:ring-brand-blue/30">
                <option value="active">Active</option>
                <option value="pending">Pending</option>
                <option value="cancelled">Cancelled</option>
                <option value="completed">Completed</option>
              </select>
            </div>

            <!-- Form Buttons -->
            <div class="flex gap-3 pt-4">
              <button type="submit" id="createBtn" value="create" class="flex-1 bg-brand-primary text-white px-6 py-3 rounded-2xl text-sm font-semibold hover:bg-brand-dark/80 transition-all duration-200">Create Reservation</button>
              <button type="button" id="clearBtn" class="flex-1 bg-gray-100 text-gray-700 px-6 py-3 rounded-2xl text-sm font-semibold hover:bg-gray-200 transition-all duration-200">Clear Form</button>
            </div>
            <div class="flex gap-3 hidden" id="editButtons">
              <button type="submit" id="updateBtn" value="update" class="flex-1 bg-amber-500 text-white px-6 py-3 rounded-2xl text-sm font-semibold hover:bg-amber-600 transition-all duration-200">Update Reservation</button>
              <button type="button" id="deleteBtn" class="flex-1 bg-rose-500 text-white px-6 py-3 rounded-2xl text-sm font-semibold hover:bg-rose-600 transition-all duration-200">Delete</button>
              <button type="button" id="cancelEditBtn" class="flex-1 bg-gray-100 text-gray-700 px-6 py-3 rounded-2xl text-sm font-semibold hover:bg-gray-200 transition-all duration-200">Cancel</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Right Column: Reservations List -->
      <div>
        <div class="bg-white rounded-2xl border border-black/10 p-6">
          <h3 class="text-lg font-semibold mb-4">Existing Reservations</h3>
          
          <!-- Reservations List -->
          <div id="reservationsList" class="space-y-3 max-h-[600px] overflow-y-auto pr-2">
            <div class="text-center text-gray-500 py-8">Loading reservations...</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // ==================== HELPER FUNCTIONS ====================
    function $(id) { return document.getElementById(id); }

    function showMessage(type, message) {
      const el = $('formMessage');
      if (!el) return;
      
      el.className = 'mb-6 rounded-2xl border px-4 py-3 text-sm whitespace-pre-line';
      el.classList.remove('hidden');
      
      if (type === 'success') {
        el.classList.add('border-emerald-200', 'bg-emerald-50', 'text-emerald-900');
      } else if (type === 'info') {
        el.classList.add('border-amber-200', 'bg-amber-50', 'text-amber-900');
      } else {
        el.classList.add('border-rose-200', 'bg-rose-50', 'text-rose-900');
      }
      
      el.textContent = message;
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function clearMessage() {
      const el = $('formMessage');
      if (!el) return;
      el.textContent = '';
      el.classList.add('hidden');
    }

    async function fetchWithAuth(url, options = {}) {
      const token = localStorage.getItem('token');
      const headers = {
        'Content-Type': 'application/json',
        ...(token && { 'Authorization': `Bearer ${token}` }),
        ...options.headers
      };
      
      const response = await fetch(url, { ...options, headers });
      
      if (response.status === 401) {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
        return null;
      }
      
      return response;
    }

    // ==================== DATA LOADING ====================
    async function loadResources() {
      try {
        const response = await fetchWithAuth('/api/resources');
        if (!response || !response.ok) return;
        
        const data = await response.json();
        const resources = Array.isArray(data.data) ? data.data : [];
        
        const select = $('resourceId');
        select.innerHTML = '<option value="">Select a resource</option>';
        
        resources.forEach(resource => {
          const option = document.createElement('option');
          option.value = resource.id;
          option.textContent = `${resource.name} (ID: ${resource.id})`;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Failed to load resources:', err);
      }
    }

   async function loadUsers() {
  // Using hardcoded user ID 1 - no API call needed
  console.log('Using hardcoded user ID: 1');
  
  // Optional: Show user info in the UI
  const userInfoDiv = document.createElement('div');
  userInfoDiv.className = 'bg-blue-50 border border-blue-200 rounded-2xl p-3 text-sm text-blue-800 mt-2';
  userInfoDiv.innerHTML = 'Creating reservations as <strong>User ID: 1</strong>';
  
  // Find the userId field and insert the info after it
  const userIdField = $('userId');
  if (userIdField) {
    // Hide the select dropdown since we're using hidden input
    userIdField.style.display = 'none';
    
    // Insert the info div after the hidden field
    userIdField.insertAdjacentElement('afterend', userInfoDiv);
  }
  
  return Promise.resolve();
}

    async function loadReservations() {
      try {
        const response = await fetchWithAuth('/api/reservations');
        if (!response) return;
        
        if (!response.ok) {
          $('reservationsList').innerHTML = '<div class="text-center text-gray-500 py-8">Failed to load reservations</div>';
          return;
        }
        
        const data = await response.json();
        const reservations = Array.isArray(data.data) ? data.data : [];
        
        if (reservations.length === 0) {
          $('reservationsList').innerHTML = '<div class="text-center text-gray-500 py-8">No reservations found</div>';
          return;
        }
        
        $('reservationsList').innerHTML = reservations.map(res => `
          <div class="reservation-item border border-black/10 rounded-2xl p-4 hover:bg-gray-50 cursor-pointer transition" data-reservation='${JSON.stringify(res)}'>
            <div class="flex justify-between items-start">
              <div>
                <div class="font-semibold">Reservation #${res.id}</div>
                <div class="text-sm text-gray-600 mt-1">Resource ID: ${res.resourceId}</div>
                <div class="text-sm text-gray-600">User ID: ${res.userId}</div>
                <div class="text-sm text-gray-600">${new Date(res.startTime).toLocaleString()} - ${new Date(res.endTime).toLocaleString()}</div>
                ${res.note ? `<div class="text-sm text-gray-500 mt-1">"${res.note}"</div>` : ''}
              </div>
              <span class="px-2 py-1 text-xs rounded-full ${getStatusBadgeClass(res.status)}">${res.status}</span>
            </div>
          </div>
        `).join('');
        
        document.querySelectorAll('.reservation-item').forEach(item => {
          item.addEventListener('click', () => {
            const reservation = JSON.parse(item.dataset.reservation);
            fillFormForEdit(reservation);
          });
        });
        
      } catch (err) {
        console.error('Failed to load reservations:', err);
        $('reservationsList').innerHTML = '<div class="text-center text-gray-500 py-8">Error loading reservations</div>';
      }
    }

    function getStatusBadgeClass(status) {
      switch(status) {
        case 'active': return 'bg-green-100 text-green-800';
        case 'pending': return 'bg-yellow-100 text-yellow-800';
        case 'cancelled': return 'bg-red-100 text-red-800';
        case 'completed': return 'bg-blue-100 text-blue-800';
        default: return 'bg-gray-100 text-gray-800';
      }
    }

    // ==================== FORM HANDLING ====================
    function getFormData() {
      return {
        id: $('reservationId')?.value || '',
        resourceId: parseInt($('resourceId')?.value) || 0,
        userId: parseInt($('userId')?.value) || 0,
        startTime: $('startTime')?.value ? new Date($('startTime').value).toISOString() : '',
        endTime: $('endTime')?.value ? new Date($('endTime').value).toISOString() : '',
        note: $('note')?.value || '',
        status: $('status')?.value || 'active'
      };
    }

    function validateForm(data) {
      if (!data.resourceId) return 'Please select a resource';
      if (!data.userId) return 'Please select a user';
      if (!data.startTime) return 'Start time is required';
      if (!data.endTime) return 'End time is required';
      if (new Date(data.startTime) >= new Date(data.endTime)) {
        return 'End time must be after start time';
      }
      return null;
    }

    function clearForm() {
      $('reservationId').value = '';
      $('resourceId').value = '';
      $('userId').value = '';
      $('startTime').value = '';
      $('endTime').value = '';
      $('note').value = '';
      $('status').value = 'active';
      
      // Show create mode buttons
      document.querySelector('#reservationForm > div:first-of-type').classList.remove('hidden');
      $('editButtons').classList.add('hidden');
      $('formTitle').textContent = 'Create New Reservation';
      
      clearMessage();
    }

    function fillFormForEdit(reservation) {
      $('reservationId').value = reservation.id;
      $('resourceId').value = reservation.resourceId;
      $('userId').value = reservation.userId;
      
      // Format dates for datetime-local input
      if (reservation.startTime) {
        const startDate = new Date(reservation.startTime);
        $('startTime').value = startDate.toISOString().slice(0, 16);
      }
      if (reservation.endTime) {
        const endDate = new Date(reservation.endTime);
        $('endTime').value = endDate.toISOString().slice(0, 16);
      }
      
      $('note').value = reservation.note || '';
      $('status').value = reservation.status || 'active';
      
      // Show edit mode buttons
      document.querySelector('#reservationForm > div:first-of-type').classList.add('hidden');
      $('editButtons').classList.remove('hidden');
      $('formTitle').textContent = 'Edit Reservation';
      
      clearMessage();
    }

    // ==================== API OPERATIONS ====================
    async function createReservation(data) {
      const response = await fetchWithAuth('/api/reservations', {
        method: 'POST',
        body: JSON.stringify(data)
      });
      
      if (!response) return false;
      
      if (response.status === 201) {
        showMessage('success', `✅ Reservation created successfully!`);
        clearForm();
        await loadReservations();
        return true;
      } else {
        const error = await response.json().catch(() => ({}));
        showMessage('error', error.message || 'Failed to create reservation');
        return false;
      }
    }

    async function updateReservation(id, data) {
      const response = await fetchWithAuth(`/api/reservations/${id}`, {
        method: 'PUT',
        body: JSON.stringify(data)
      });
      
      if (!response) return false;
      
      if (response.ok) {
        showMessage('success', `✅ Reservation updated successfully!`);
        clearForm();
        await loadReservations();
        return true;
      } else {
        const error = await response.json().catch(() => ({}));
        showMessage('error', error.message || 'Failed to update reservation');
        return false;
      }
    }

    async function deleteReservation(id) {
      if (!confirm('Are you sure you want to delete this reservation?')) return false;
      
      const response = await fetchWithAuth(`/api/reservations/${id}`, {
        method: 'DELETE'
      });
      
      if (!response) return false;
      
      if (response.status === 204 || response.ok) {
        showMessage('success', `✅ Reservation deleted successfully!`);
        clearForm();
        await loadReservations();
        return true;
      } else {
        const error = await response.json().catch(() => ({}));
        showMessage('error', error.message || 'Failed to delete reservation');
        return false;
      }
    }

    // ==================== EVENT HANDLERS ====================
    async function handleSubmit(e) {
      e.preventDefault();
      const submitter = e.submitter;
      const action = submitter?.value || 'create';
      
      const data = getFormData();
      
      // Validate
      const validationError = validateForm(data);
      if (validationError) {
        showMessage('error', validationError);
        return;
      }
      
      // Remove id from data for create
      const { id, ...createData } = data;
      
      if (action === 'create') {
        await createReservation(createData);
      } else if (action === 'update') {
        if (!data.id) {
          showMessage('error', 'Missing reservation ID');
          return;
        }
        await updateReservation(data.id, createData);
      }
    }

    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', async () => {
      // Check authentication
      const token = localStorage.getItem('token');
      if (!token) {
        window.location.href = '/login.html';
        return;
      }
      
      // Load dropdown data
      await Promise.all([
        loadResources(),
        loadUsers(),
        loadReservations()
      ]);
      
      // Setup form submission
      $('reservationForm').addEventListener('submit', handleSubmit);
      
      // Setup buttons
      $('clearBtn').addEventListener('click', clearForm);
      
      $('deleteBtn').addEventListener('click', async () => {
        const id = $('reservationId').value;
        if (!id) {
          showMessage('error', 'No reservation selected');
          return;
        }
        await deleteReservation(id);
      });
      
      $('cancelEditBtn').addEventListener('click', clearForm);
      
      $('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('token');
        window.location.href = '/login.html';
      });
    });
  </script>
</body>
</html>
